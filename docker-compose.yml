services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bansach-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bansach-web
    environment:
      BAN_SACH_CONNECTION_STRING: "Data Source=db,1433;Initial Catalog=BanSachPremium;User ID=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True"
      BAN_SACH_APP_ROOT: "/app/Source"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - book_uploads:/app/Source/img/books

volumes:
  mssql_data:
  book_uploads:
